# Render blueprint for the Clearway API.
# DB lives on Neon; set DATABASE_URL + secrets in the Render dashboard.
services:
  - type: web
    name: clearway-api
    runtime: node
    rootDir: server
    plan: starter
    # Schema already lives on Neon (pushed locally); build only needs to generate
    # the Prisma client. `prisma generate` does NOT require DATABASE_URL, so the
    # build never depends on dashboard secrets. The app connects at runtime.
    buildCommand: npm install && npx prisma generate
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Pin to the Node major we tested on (Render otherwise picks a bleeding-edge build).
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
